    Do not provide any additional information in the short_answer
  yes_no_questions: |
    Only answer "Yes." or "No."

  multiple_choice_questions: |
    Only answer with the provided letter corresponding to the correct option without interpunction. 

  multiple_parts: |
    Keep all the provided question parts in the question. Answer all parts in the reasoning and short_answer. Do not drop any part of the question!

  init_q_main: |
    The short_answer must consist of exactly two sentences. Fill up this template. ONLY replace the <tags>.
