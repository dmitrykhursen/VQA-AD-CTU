prompts:
  context: |
    You are an AI assistant analyzing a driving scene captured from the cameras and sensors of an autonomous vehicle.
    Your task is to generate exactly ONE Question/Answer (QA) pair based on a provided question template and a specified objects.

    ### SCENE CONTEXT
    - Image Size: 2448 x 2048 (width x height) px

  position: |
    Whenever the question template contains <position>, replace it with **exactly one** of the following phrases, that describes the position of the referenced object relative to the ego vehicle:
      - "left of the ego vehicle"
      - "right of the ego vehicle"
      - "front of the ego vehicle"

  important_objects: |
    Do not include all objects in your answer. Focus only on the most important objects that influence the driving decision of the ego vehicle.

  obj: |
    FOLLOW ALL FORMATTING RULES EXACTLY. DO NOT IGNORE THEM.

    **CRITICAL RULE — REPLACE <obj> TOKENS EXACTLY**

    Every time the question template contains <obj>, replace it with:
      <object_id,camera_name,cx,cy>

    Where:
    - object_id = EXACT provided object name (example: car_4)
    - camera_name = The exact camera name where the object was detected
    - cx, cy = the object's middle point coordinates
    - must use angle brackets exactly like this: < ... >
    - NEVER change the order or spacing
    - Each <obj> must use a DIFFERENT object

    **OBJECT SELECTION RULES**
    - Use ONLY objects from the provided list.
    - NEVER reuse the same object for multiple <obj> tokens.
    - Choose objects that make sense for the question.

    Apart from replacing <obj>, do NOT modify the question template in any way.
    **Never add more objects than the template requires**
    When referencing the object in the short_answer, include this tag

  no_obj: |
    Use the question exactly as provided without any modifications.  

  coordinate_system: |
    ### COORDINATE SYSTEM & SPATIAL RULES
    2D Camera Coordinates in px:
      - (0,0) = top-left
      - x increases -> right 
      - y increases -> down 
      - smaller cy = farther away 
      - larger cy = closer to ego vehicle

  answer_rules: |
    ### ANSWER RULES
    - Grounding: Your answer MUST be supported by the provided object list.
    - Prioritization: Focus mainly on vehicles. Secondly focus on pedestrians. Then objects close to the ego vehicle and objects in the path of the ego vehicle. Use objects that make sense for the question.
    - Formatting: NEVER use internal IDs (e.g., "car_0") in the answer outside of tags. Use descriptive phrases instead or the whole tag.
    - Output Format: You must output EXACTLY the following JSON structure and nothing else.
    {
        "question": "...", // MUST contain correctly formatted object tags
        "reasoning": "...", // MUST include consice spatial analysis
        "short_answer": "..." // MUST be brief (yes/no or 1-2 sentences). USE ONLY QUALITATIVE SPATIAL TERMS RELATIVE TO THE EGO VEHICLE. NO NUMERIC DISTANCES OR UNITS
    }

  detected_objects_tracks_custom: |
    ### DETECTED OBJECTS DATA
    Use the exact question template provided without modifications.
    pos_history is taken from the previous frames (..., t-2, t-1) and the current frame (t-0)
    Data Schema:
    {"id":"Camera_ObjectType","bbox":[x, y, width, height in px],"center":[cx, cy in px],"pos_history":[..., [x,y,z at t-2],[x,y,z at t-1],[x,y,z at t-0] in meters]}
    *Note: If an object is new at t=0, pos_history will only contain one array: [x,y,z at t-0]*

  detected_objects_tracks_nuscenes: |
    ### DETECTED OBJECTS DATA
    Use the exact question template provided without modifications.
    pos_history is taken from the previous frames (..., t-2, t-1) and the current frame (t-0)
    Data Schema: 
    {"id":"Camera_ObjectType","bbox":[x, y, width, height in px],"center":[cx, cy in px],"pos_history":[..., [x,y,z,d at t-2],[x,y,z,d at t-1],[x,y,z,d at t-0] in meters]}
    *Note: If an object is new at t=0, pos_history will only contain one array: [x,y,z,d at t-0]*

  detected_objects: |
    ### DETECTED OBJECTS DATA
    Use the exact question template provided without modifications.
    Data Schema: 
    {"id":"Camera_ObjectType","bbox":[cx, cy, width, height in px],"center":[cx, cy in px]}

  custom_tracks_coords_m: |
    3D Ego Vehicle Coordinates [x, y, z in meters]:
    - x < 0 left of ego vehicle, x > 0 right of ego vehicle
    - y < 0 below sensor, y > 0 above sensor (sensor mounted on the roof of the vehicle)
    - z > 0 forward distance only (measured parallel to the ground from the sensor)
    the position history is captured at a fixed temporal cadence

  nuscenes_tracks_coords_m: |
    3D Ego Vehicle Coordinates (nuScenes format: [x, y, z, d in meters]):
    - x > 0: forward (in front of ego), x < 0: backward
    - y > 0: left of ego, y < 0: right
    - z > 0: up, z < 0: down
    - d: Euclidean distance from ego vehicle
    the position history is captured roughly every 500 ms

  nuscenes_tracks_coords_global_m: |
    3D Global Map Coordinates (nuScenes format: [x, y, z, d in meters]):
    - x: Fixed global map X-axis (points East), NOT relative to the car.
    - y: Fixed global map Y-axis (points North), NOT relative to the car.
    - z: Absolute elevation/height in the global map.
    - d: Euclidean distance from ego vehicle to the object.
    the position history is captured roughly every 500 ms

    Crucial Instruction: 
    To determine if an object is in front, behind, or to the side of the car, you must use the Ego Vehicle's Global Position and Heading to determine which way the windshield is facing

  # <dataset_name>_dataset_car_in_view: (optional, camera-specific)
  # Add a key matching your dataset if the ego vehicle is visible in the camera image.
  # Example format:
  #   custom_dataset_car_in_view: |
  #     Ego vehicle:
  #     - bounding box [x, y, w, h], midpoint [cx, cy]
  #     - <describe where/how ego appears in the image>

